name: Daily Heartbeat

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: repo-health-${{ github.ref }}
  cancel-in-progress: false

jobs:
  health:
    name: Repository health
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set date and deterministic schedule
        id: schedule
        run: |
          set -euo pipefail
          export DATE=$(date -u +%Y-%m-%d)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          python3 << 'PY'
          import hashlib
          import os
          repo = os.environ["GITHUB_REPOSITORY"]
          date = os.environ["DATE"]
          seed = f"{repo}{date}"
          h = hashlib.sha256(seed.encode()).hexdigest()
          run_count = 2 + (int(h[:8], 16) % 7)
          order = list(range(24))
          order.sort(key=lambda i: hashlib.sha256(f"{seed}{i}".encode()).hexdigest())
          allowed = sorted(order[:run_count])
          allowed_str = ",".join(f"{h:02d}" for h in allowed)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"run_count={run_count}\n")
            f.write(f"allowed_hours={allowed_str}\n")
          PY

      - name: Skip if not an execution hour
        id: skip
        run: |
          set -euo pipefail
          CURRENT_HOUR=$(date -u +%H)
          ALLOWED="${{ steps.schedule.outputs.allowed_hours }}"
          if [[ ",${ALLOWED}," != *",${CURRENT_HOUR},"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: hour ${CURRENT_HOUR} not in [${ALLOWED}]"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute jitter
        if: steps.skip.outputs.skip != 'true'
        id: jitter
        run: |
          set -euo pipefail
          export DATE="${{ steps.schedule.outputs.date }}"
          export CURRENT_HOUR=$(date -u +%H)
          python3 << 'PY'
          import hashlib
          import os
          repo = os.environ["GITHUB_REPOSITORY"]
          date = os.environ["DATE"]
          hour = os.environ["CURRENT_HOUR"]
          seed = f"{repo}{date}jitter{hour}"
          h = hashlib.sha256(seed.encode()).hexdigest()
          jitter_min = int(h[:4], 16) % 60
          jitter_seconds = jitter_min * 60
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"jitter_seconds={jitter_seconds}\n")
          PY

      - name: Apply jitter
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sleep ${{ steps.jitter.outputs.jitter_seconds }}

      - name: Generate repo-health.json
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          export DATE="${{ steps.schedule.outputs.date }}"
          export TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          export RUN_ID="${{ github.run_id }}"
          export TRACKED_FILES=$(git ls-files | wc -l | tr -d ' ')
          export LATEST_COMMIT=$(git rev-parse HEAD)
          python3 << 'PY'
          import json
          import os
          data = {
            "date": os.environ["DATE"],
            "timestamp": os.environ["TIMESTAMP"],
            "run_id": os.environ["RUN_ID"],
            "tracked_files": int(os.environ["TRACKED_FILES"]),
            "latest_commit": os.environ["LATEST_COMMIT"],
            "workflow_run": int(os.environ["RUN_ID"]),
          }
          with open("repo-health.json", "w") as f:
            json.dump(data, f, indent=2)
          PY

      - name: Commit and push
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          DATE="${{ steps.schedule.outputs.date }}"
          CURRENT_HOUR=$(date -u +%H)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo-health.json
          if git diff --staged --quiet; then
            echo "No changes to repo-health.json"
            exit 0
          fi
          git commit -m "chore(health): repository status update ${DATE} ${CURRENT_HOUR}"
          git push

